<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Brain Master</title>

<style>

body{
font-family:Arial;
text-align:center;
background:linear-gradient(135deg,#0f172a,#1e293b);
color:white;
margin:0;
}

.section{
display:none;
animation:fade 0.4s;
}

button{
padding:15px;
margin:10px;
font-size:18px;
border:none;
border-radius:10px;
background:#22c55e;
color:white;
cursor:pointer;
transition:0.2s;
}

button:hover{
transform:scale(1.1);
background:#16a34a;
}

.option{
background:#334155;
margin:10px;
padding:15px;
border-radius:10px;
cursor:pointer;
}

.option:hover{
background:#475569;
}

#box{
width:150px;
height:150px;
background:red;
margin:auto;
display:none;
border-radius:15px;
}

#puzzleBoard{
display:grid;
grid-template-columns:repeat(3,90px);
gap:10px;
justify-content:center;
}

.tile{
width:90px;
height:90px;
background:#38bdf8;
display:flex;
align-items:center;
justify-content:center;
font-size:30px;
border-radius:10px;
cursor:pointer;
}

#memoryBoard{
display:grid;
grid-template-columns:repeat(4,70px);
gap:10px;
justify-content:center;
}

.card{
width:70px;
height:70px;
background:#38bdf8;
display:flex;
align-items:center;
justify-content:center;
font-size:24px;
border-radius:10px;
cursor:pointer;
}

@keyframes fade{
from{opacity:0}
to{opacity:1}
}

</style>
</head>

<body>

<h1>🧠 Brain Master</h1>

<div id="menu" class="section" style="display:block">

<button onclick="guest()">Guest kirish</button>
<button onclick="show('login')">Login</button>

</div>


<div id="login" class="section">

<input id="username" placeholder="Username"><br><br>
<input id="password" type="password" placeholder="Password"><br><br>

<button onclick="login()">Login</button>
<button onclick="register()">Register</button>
<button onclick="show('menu')">⬅ Orqaga</button>

</div>


<div id="game" class="section">

<h2 id="user"></h2>

<button onclick="startQuiz()">IQ Test</button>
<button onclick="show('reaction')">Reaction</button>
<button onclick="show('puzzle')">Puzzle</button>
<button onclick="show('clickGame')">Click Speed</button>
<button onclick="show('memoryGame')">Memory Game</button>
<button onclick="showLeaderboard()">Leaderboard</button>

</div>


<div id="quiz" class="section">

<h2 id="question"></h2>
<div id="answers"></div>
<p id="result"></p>

<button onclick="show('game')">⬅ Orqaga</button>

</div>


<div id="reaction" class="section">

<h2>Yashil bo‘lsa tez bos!</h2>

<button onclick="startReaction()">Start</button>

<div id="box" onclick="stopReaction()"></div>

<p id="reactionResult"></p>

<button onclick="show('game')">⬅ Orqaga</button>

</div>


<div id="puzzle" class="section">

<h2>Puzzle</h2>

<div id="puzzleBoard"></div>

<button onclick="show('game')">⬅ Orqaga</button>

</div>


<div id="clickGame" class="section">

<h2>Click Speed</h2>

<button onclick="startClick()">Start</button>

<h1 id="clickCount">0</h1>

<button onclick="clickBtn()">CLICK</button>

<p id="clickResult"></p>

<button onclick="show('game')">⬅ Orqaga</button>

</div>


<div id="memoryGame" class="section">

<h2>Memory Game</h2>

<div id="memoryBoard"></div>

<button onclick="show('game')">⬅ Orqaga</button>

</div>


<div id="leaderboard" class="section">

<h2>Leaderboard</h2>

<ul id="leaderboardList"></ul>

<button onclick="show('game')">⬅ Orqaga</button>

</div>


<script>

let currentUser="Guest"

function show(id){

document.querySelectorAll(".section").forEach(s=>s.style.display="none")
document.getElementById(id).style.display="block"

}

function guest(){

currentUser="Guest"
document.getElementById("user").innerText="User: Guest"
show("game")

}

function register(){

let u=username.value
let p=password.value

localStorage.setItem("user_"+u,p)

alert("Ro'yhatdan o'tdi")

}

function login(){

let u=username.value
let p=password.value

if(localStorage.getItem("user_"+u)==p){

currentUser=u
document.getElementById("user").innerText="User: "+u
show("game")

}else{

alert("Login xato")

}

}

let questions=[
{q:"2+2?",a:["3","4","5","6"],c:1},
{q:"5x2?",a:["7","10","8","9"],c:1},
{q:"9-3?",a:["3","6","5","4"],c:1}
]

let q=0
let score=0

function startQuiz(){

q=0
score=0
show("quiz")
showQuestion()

}

function showQuestion(){

let qu=questions[q]

question.innerText=qu.q
answers.innerHTML=""

qu.a.forEach((a,i)=>{

let div=document.createElement("div")
div.className="option"
div.innerText=a
div.onclick=()=>check(i)

answers.appendChild(div)

})

}

function check(i){

if(i==questions[q].c)score++

q++

if(q<questions.length){

showQuestion()

}else{

result.innerText="Natija: "+score

if(currentUser!="Guest"){

localStorage.setItem("score_"+currentUser,score)

}

}

}

let startTime

function startReaction(){

box.style.display="none"

setTimeout(()=>{

box.style.display="block"
box.style.background="green"
startTime=new Date().getTime()

},Math.random()*2000+1000)

}

function stopReaction(){

let time=new Date().getTime()-startTime

reactionResult.innerText="Vaqt: "+time+" ms"

box.style.display="none"

}

let numbers=[1,2,3,4,5,6,7,8,""]

numbers.sort(()=>Math.random()-0.5)

function drawPuzzle(){

puzzleBoard.innerHTML=""

numbers.forEach((n,i)=>{

let tile=document.createElement("div")
tile.className="tile"
tile.innerText=n
tile.onclick=()=>move(i)

puzzleBoard.appendChild(tile)

})

}

function move(i){

let empty=numbers.indexOf("")

let diff=[-1,1,-3,3]

if(diff.includes(empty-i)){

[numbers[i],numbers[empty]]=[numbers[empty],numbers[i]]

drawPuzzle()

}

}

drawPuzzle()

let clickCount=0
let clicking=false

function startClick(){

clickCount=0
clicking=true

setTimeout(()=>{

clicking=false
clickResult.innerText="Natija: "+clickCount

},10000)

}

function clickBtn(){

if(clicking){

clickCount++
clickCount.innerText=clickCount

}

}

let cards=[1,1,2,2,3,3,4,4]

cards.sort(()=>Math.random()-0.5)

let first=null

function drawMemory(){

memoryBoard.innerHTML=""

cards.forEach((c,i)=>{

let card=document.createElement("div")

card.className="card"

card.innerText="?"

card.onclick=()=>flip(card,i)

memoryBoard.appendChild(card)

})

}

function flip(card,i){

card.innerText=cards[i]

if(!first){

first={card,i}

}else{

if(cards[first.i]!=cards[i]){

setTimeout(()=>{

card.innerText="?"
first.card.innerText="?"
first=null

},800)

}else{

first=null

}

}

}

drawMemory()

function showLeaderboard(){

leaderboardList.innerHTML=""

for(let i in localStorage){

if(i.startsWith("score_")){

let user=i.replace("score_","")

let li=document.createElement("li")

li.innerText=user+" : "+localStorage.getItem(i)

leaderboardList.appendChild(li)

}

}

show("leaderboard")

}

</script>

</body>
</html>
